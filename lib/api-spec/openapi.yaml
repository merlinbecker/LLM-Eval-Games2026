openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LLM Eval Games 2026 API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: session
    description: Session management and vault sync
  - name: gateways
    description: LLM Gateway configuration
  - name: datasets
    description: Test dataset management
  - name: competitions
    description: Competition management
  - name: logs
    description: LLM call logs
  - name: models
    description: Model listing from gateways
  - name: configured-models
    description: Pre-configured model selections
  - name: activities
    description: Background activity tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /session/sync:
    post:
      operationId: syncSession
      tags: [session]
      summary: Create or restore a session from client vault data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionSyncRequest"
      responses:
        "200":
          description: Session synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSyncResponse"

  /session:
    delete:
      operationId: deleteSession
      tags: [session]
      summary: Delete the current session and clear the cookie
      responses:
        "200":
          description: Session deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /gateways:
    get:
      operationId: listGateways
      tags: [gateways]
      summary: List all configured LLM gateways
      responses:
        "200":
          description: List of gateways
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gateway"
    post:
      operationId: createGateway
      tags: [gateways]
      summary: Add a new LLM gateway
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGateway"
      responses:
        "201":
          description: Gateway created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gateway"

  /gateways/{id}:
    delete:
      operationId: deleteGateway
      tags: [gateways]
      summary: Delete a gateway
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /gateways/{id}/models:
    get:
      operationId: listGatewayModels
      tags: [models]
      summary: List available models from a specific gateway
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ModelInfo"

  /configured-models:
    get:
      operationId: listConfiguredModels
      tags: [configured-models]
      summary: List all pre-configured models
      responses:
        "200":
          description: List of configured models
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ConfiguredModel"
    post:
      operationId: createConfiguredModel
      tags: [configured-models]
      summary: Save a pre-configured model
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConfiguredModel"
      responses:
        "201":
          description: Configured model saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfiguredModel"

  /configured-models/{id}:
    put:
      operationId: updateConfiguredModel
      tags: [configured-models]
      summary: Update a configured model (name, costs, modelId)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateConfiguredModel"
      responses:
        "200":
          description: Updated configured model
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConfiguredModel"
    delete:
      operationId: deleteConfiguredModel
      tags: [configured-models]
      summary: Delete a configured model
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /configured-models/{id}/test:
    post:
      operationId: testConfiguredModel
      tags: [configured-models]
      summary: Send a hello-world test prompt to validate the model configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Test completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelTestResult"
        "400":
          description: Test failed (LLM error)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelTestResult"

  /datasets:
    get:
      operationId: listDatasets
      tags: [datasets]
      summary: List all datasets
      responses:
        "200":
          description: List of datasets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Dataset"
    post:
      operationId: createDataset
      tags: [datasets]
      summary: Create a new dataset (upload markdown)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDataset"
      responses:
        "201":
          description: Dataset created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"

  /datasets/upload:
    post:
      operationId: uploadDataset
      tags: [datasets]
      summary: Upload a markdown file as a new dataset
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: A .md (Markdown) file
                name:
                  type: string
                  description: Dataset name (defaults to filename if omitted)
              required:
                - file
      responses:
        "201":
          description: Dataset created from uploaded file
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
        "400":
          description: Invalid file type or content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /datasets/{id}:
    get:
      operationId: getDataset
      tags: [datasets]
      summary: Get a single dataset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dataset detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
    put:
      operationId: updateDataset
      tags: [datasets]
      summary: Update a dataset (name, content, systemPrompt)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDataset"
      responses:
        "200":
          description: Updated dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"
    delete:
      operationId: deleteDataset
      tags: [datasets]
      summary: Delete a dataset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /datasets/{id}/privacy-check:
    post:
      operationId: privacyCheckDataset
      tags: [datasets]
      summary: Run a privacy/PII check on a dataset using an LLM
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivacyCheckRequest"
      responses:
        "200":
          description: Privacy check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PrivacyCheckResult"

  /datasets/{id}/anonymize:
    post:
      operationId: anonymizeDataset
      tags: [datasets]
      summary: Anonymize PII in a dataset using an LLM
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnonymizeRequest"
      responses:
        "200":
          description: Anonymized dataset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dataset"

  /datasets/generate:
    post:
      operationId: generateDataset
      tags: [datasets]
      summary: Generate a test dataset using an LLM (runs in background)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateDatasetRequest"
      responses:
        "202":
          description: Dataset generation started in background
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackgroundJobAccepted"

  /competitions:
    get:
      operationId: listCompetitions
      tags: [competitions]
      summary: List all competitions
      responses:
        "200":
          description: List of competitions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Competition"
    post:
      operationId: createCompetition
      tags: [competitions]
      summary: Create a new competition
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompetition"
      responses:
        "201":
          description: Competition created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Competition"

  /competitions/{id}:
    get:
      operationId: getCompetition
      tags: [competitions]
      summary: Get competition details with results
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Competition with results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitionDetail"
    delete:
      operationId: deleteCompetition
      tags: [competitions]
      summary: Delete a competition
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /competitions/{id}/run:
    post:
      operationId: runCompetition
      tags: [competitions]
      summary: Start running a competition (evaluate all models asynchronously)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Competition run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompetitionDetail"

  /logs:
    get:
      operationId: listLlmLogs
      tags: [logs]
      summary: List all LLM call logs for the current session
      responses:
        "200":
          description: List of LLM logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LlmLog"
    delete:
      operationId: clearLlmLogs
      tags: [logs]
      summary: Clear all LLM call logs for the current session
      responses:
        "200":
          description: Logs cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessMessage"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all background activities for the current session
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get a specific background activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}/ack:
    post:
      operationId: acknowledgeActivity
      tags: [activities]
      summary: Acknowledge (mark as read) a completed activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    SuccessMessage:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SessionSyncRequest:
      type: object
      properties:
        gateways:
          type: array
          items:
            $ref: "#/components/schemas/CreateGateway"
        datasets:
          type: array
          items:
            $ref: "#/components/schemas/CreateDataset"

    SessionSyncResponse:
      type: object
      properties:
        sessionId:
          type: string
        gatewayCount:
          type: integer
        datasetCount:
          type: integer
      required:
        - sessionId
        - gatewayCount
        - datasetCount

    GatewayType:
      type: string
      enum: [openrouter, github_copilot, custom, custom_openai, custom_anthropic, custom_gemini]

    Gateway:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          $ref: "#/components/schemas/GatewayType"
        baseUrl:
          type: string
        customHeaders:
          type: object
          additionalProperties:
            type: string
          description: Custom HTTP headers (key-value pairs)
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - type
        - baseUrl
        - createdAt

    CreateGateway:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/GatewayType"
        baseUrl:
          type: string
        apiKey:
          type: string
        customHeaders:
          type: object
          additionalProperties:
            type: string
          description: Custom HTTP headers (key-value pairs)
      required:
        - name
        - type
        - baseUrl
        - apiKey

    ConfiguredModel:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        gatewayId:
          type: integer
        modelId:
          type: string
        inputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million input tokens (optional override)
        outputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million output tokens (optional override)
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - gatewayId
        - modelId
        - createdAt

    CreateConfiguredModel:
      type: object
      properties:
        name:
          type: string
        gatewayId:
          type: integer
        modelId:
          type: string
        inputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million input tokens (optional)
        outputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million output tokens (optional)
      required:
        - name
        - gatewayId
        - modelId

    UpdateConfiguredModel:
      type: object
      properties:
        name:
          type: string
        modelId:
          type: string
        inputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million input tokens
        outputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million output tokens

    ModelTestResult:
      type: object
      properties:
        success:
          type: boolean
        response:
          type: string
          description: The LLM response text (or error message on failure)
        durationMs:
          type: number
          description: Round-trip time in milliseconds
        promptTokens:
          type: integer
        completionTokens:
          type: integer
      required:
        - success
        - response
        - durationMs

    ModelInfo:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        gatewayId:
          type: integer
        gatewayName:
          type: string
      required:
        - id
        - name
        - gatewayId
        - gatewayName

    Dataset:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        content:
          type: string
        privacyStatus:
          type: string
          enum: [unchecked, clean, issues_found, anonymized]
        privacyReport:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - content
        - privacyStatus
        - createdAt

    CreateDataset:
      type: object
      properties:
        name:
          type: string
        content:
          type: string
      required:
        - name
        - content

    PrivacyCheckRequest:
      type: object
      properties:
        gatewayId:
          type: integer
        modelId:
          type: string
      required:
        - gatewayId
        - modelId

    PrivacyCheckResult:
      type: object
      properties:
        status:
          type: string
          enum: [clean, issues_found]
        findings:
          type: array
          items:
            $ref: "#/components/schemas/PrivacyFinding"
        report:
          type: string
      required:
        - status
        - findings
        - report

    PrivacyFinding:
      type: object
      properties:
        type:
          type: string
        text:
          type: string
        suggestion:
          type: string
      required:
        - type
        - text
        - suggestion

    AnonymizeRequest:
      type: object
      properties:
        gatewayId:
          type: integer
        modelId:
          type: string
      required:
        - gatewayId
        - modelId

    UpdateDataset:
      type: object
      properties:
        name:
          type: string
        content:
          type: string

    GenerateDatasetRequest:
      type: object
      properties:
        name:
          type: string
        topic:
          type: string
          description: Description of the data to generate
        numberOfItems:
          type: integer
        examples:
          type: string
          description: Optional example items to guide the generation style and format
        gatewayId:
          type: integer
        modelId:
          type: string
      required:
        - name
        - topic
        - numberOfItems
        - gatewayId
        - modelId

    Competition:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        datasetId:
          type: integer
        status:
          type: string
          enum: [draft, running, completed, error]
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - datasetId
        - status
        - createdAt

    CreateCompetition:
      type: object
      properties:
        name:
          type: string
        datasetId:
          type: integer
        systemPrompt:
          type: string
        contestantModels:
          type: array
          items:
            $ref: "#/components/schemas/ModelSelection"
        judgeModels:
          type: array
          items:
            $ref: "#/components/schemas/ModelSelection"
      required:
        - name
        - datasetId
        - systemPrompt
        - contestantModels
        - judgeModels

    ModelSelection:
      type: object
      properties:
        gatewayId:
          type: integer
        modelId:
          type: string
        modelName:
          type: string
        inputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million input tokens (optional override)
        outputCostPerMillionTokens:
          type: ["number", "null"]
          description: Cost in USD per million output tokens (optional override)
      required:
        - gatewayId
        - modelId
        - modelName

    CompetitionDetail:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        datasetId:
          type: integer
        systemPrompt:
          type: string
        status:
          type: string
          enum: [draft, running, completed, error]
        contestantModels:
          type: array
          items:
            $ref: "#/components/schemas/ModelSelection"
        judgeModels:
          type: array
          items:
            $ref: "#/components/schemas/ModelSelection"
        results:
          type: array
          items:
            $ref: "#/components/schemas/CompetitionResult"
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - datasetId
        - systemPrompt
        - status
        - contestantModels
        - judgeModels
        - results
        - createdAt

    CompetitionResult:
      type: object
      properties:
        gatewayId:
          type: integer
        modelId:
          type: string
        modelName:
          type: string
        avgSpeed:
          type: number
        totalCost:
          type: number
        avgQuality:
          type: number
        totalTokens:
          type: integer
        responses:
          type: array
          items:
            $ref: "#/components/schemas/ModelResponse"
      required:
        - gatewayId
        - modelId
        - modelName
        - avgSpeed
        - totalCost
        - avgQuality
        - totalTokens
        - responses

    ModelResponse:
      type: object
      properties:
        dataItemIndex:
          type: integer
        response:
          type: string
        durationMs:
          type: number
        promptTokens:
          type: integer
        completionTokens:
          type: integer
        cost:
          type: number
        judgeScores:
          type: array
          items:
            $ref: "#/components/schemas/JudgeScore"
      required:
        - dataItemIndex
        - response
        - durationMs
        - promptTokens
        - completionTokens
        - cost
        - judgeScores

    JudgeScore:
      type: object
      properties:
        judgeModelId:
          type: string
        judgeModelName:
          type: string
        score:
          type: integer
        reasoning:
          type: string
      required:
        - judgeModelId
        - judgeModelName
        - score
        - reasoning

    LlmLog:
      type: object
      properties:
        id:
          type: integer
        timestamp:
          type: string
          format: date-time
        gatewayType:
          type: string
        modelId:
          type: string
        requestUrl:
          type: string
        requestBody:
          type: object
        responseStatus:
          type: integer
        responseBody:
          type: object
        durationMs:
          type: number
        error:
          type: ["string", "null"]
      required:
        - id
        - timestamp
        - gatewayType
        - modelId
        - requestUrl
        - requestBody
        - responseStatus
        - responseBody
        - durationMs
        - error

    Activity:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
          enum: [competition_run, dataset_generate]
        status:
          type: string
          enum: [running, completed, error]
        title:
          type: string
        progress:
          type: string
        resultId:
          type: integer
        error:
          type: string
        acknowledged:
          type: boolean
        createdAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
      required:
        - id
        - type
        - status
        - title
        - acknowledged
        - createdAt

    BackgroundJobAccepted:
      type: object
      properties:
        activityId:
          type: integer
        message:
          type: string
      required:
        - activityId
        - message
